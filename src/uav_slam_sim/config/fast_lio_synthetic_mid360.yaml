/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 1
        max_iteration: 3
        filter_size_surf: 0.25
        filter_size_map: 0.30
        cube_side_length: 40.0
        runtime_pos_log_enable: false
        map_file_path: "/home/accelerate/cuadc_ws/synthetic_mid360_fastlio_map.pcd"

        common:
            lid_topic: "/synthetic/livox/lidar"
            imu_topic: "/synthetic/livox/imu"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 1
            scan_line: 4
            blind: 0.45
            timestamp_unit: 3
            scan_rate: 10

        mapping:
            acc_cov: 0.001
            gyr_cov: 0.001
            b_acc_cov: 0.000001
            b_gyr_cov: 0.000001
            fov_degree: 360.0
            det_range: 12.0
            extrinsic_est_en: false
            extrinsic_T: [0.0, 0.0, 0.0]
            extrinsic_R: [1., 0., 0.,
                          0., 1., 0.,
                          0., 0., 1.]

        publish:
            path_en: true
            effect_map_en: false
            map_en: false
            scan_publish_en: true
            dense_publish_en: false
            scan_bodyframe_pub_en: true

        pcd_save:
            pcd_save_en: false
            interval: -1
